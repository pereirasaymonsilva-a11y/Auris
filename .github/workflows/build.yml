name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Restore debug keystore
        run: |
          mkdir -p .github/keystore
          # Remove todos os caracteres que não são válidos em base64
          CLEAN=$(echo "${{ secrets.ANDROID_DEBUG_KEYSTORE }}" | tr -cd 'A-Za-z0-9+/=')
          if [ -z "$CLEAN" ]; then
            echo "ERRO: segredo está vazio ou contém apenas caracteres inválidos!"
            exit 1
          fi
          echo "Tamanho do segredo limpo: ${#CLEAN} caracteres"
          echo "$CLEAN" | base64 -d > .github/keystore/debug.keystore
          echo "Keystore restaurada com sucesso."

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk